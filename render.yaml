services:
  - type: web
    name: neoface-backend
    runtime: docker
    # Build from the backend/ subdirectory
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    # Standard plan recommended: ONNX models (~800MB) are baked into the image at build time.
    # The runtime only needs RAM for the actual request workload (ML inference).
    plan: standard

    healthCheckPath: /health

    envVars:
      # ── Application ──────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

      # ── Database (Firestore) ──────────────────────────────────────────────────
      # No DATABASE_URL needed — fully migrated to Firebase Firestore.
      # Set FIREBASE_CREDENTIALS_JSON as a secret in Render Dashboard.

      # ── JWT ───────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value

      # ── Firebase ─────────────────────────────────────────────────────────────
      # IMPORTANT: Set FIREBASE_CREDENTIALS_JSON in Render Dashboard → Environment
      # as a secret env var (paste the full single-line JSON from your service account key).
      # Do NOT set it here to avoid committing credentials to git.
      - key: FIREBASE_CREDENTIALS_JSON
        value: ""

      # ── CORS ──────────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        value: '["https://neofacelabs.vercel.app","https://neoface.vercel.app","http://localhost:3000"]'

      # ── Face recognition ──────────────────────────────────────────────────────
      - key: ANTI_SPOOF_ENABLED
        value: "false"    # Models must be bundled or downloaded; disable until mounted
      - key: STRICT_MODEL_VERIFICATION
        value: "false"    # Allow startup without ONNX weights
      - key: USE_LIVENESS_PIPELINE
        value: "true"
      # ML models lazy-load on first request to avoid OOM at startup.
      # Set to true only on instances with ≥4GB RAM.
      - key: PRELOAD_MODELS
        value: "false"
      # Fix matplotlib permission error in non-root container
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib

      # ── Redis (add Render Redis add-on and replace URL) ───────────────────────
      - key: REDIS_URL
        value: redis://localhost:6379/0  # Replace with Render Redis URL

      # ── Storage ───────────────────────────────────────────────────────────────
      - key: STORAGE_BACKEND
        value: r2  # Cloudflare R2 (S3-compatible)

      # ── Admin bootstrap ───────────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        value: admin@neoface.io
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: NeoFace Admin
