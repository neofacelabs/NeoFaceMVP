services:
  - type: web
    name: neoface-backend
    runtime: docker
    # Build from the backend/ subdirectory
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: standard  # Minimum 2GB RAM required; ML models lazy-load on first request

    healthCheckPath: /health

    envVars:
      # ── Application ──────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

      # ── Database (Supabase) ───────────────────────────────────────────────────
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres.pblpwhahvwwemxhvfppd:NeoFace%402026@aws-0-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"

      # ── Supabase ─────────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://pblpwhahvwwemxhvfppd.supabase.co
      - key: SUPABASE_PROJECT_REF
        value: pblpwhahvwwemxhvfppd
      - key: SUPABASE_ANON_KEY
        value: sb_publishable_g3KDGWtSCwq88ORJHQMAAA_4gR1SFdU
      - key: SUPABASE_SERVICE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBibHB3aGFodnd3ZW14aHZmcHBkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjM2NDY0OSwiZXhwIjoyMDk3OTQwNjQ5fQ.orE66iXubOO3-6eNNSZTxWUmL2wkAVFpb-apOj-JIvs

      # ── JWT ───────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value

      # ── Firebase ─────────────────────────────────────────────────────────────
      # Set FIREBASE_CREDENTIALS_JSON in Render Dashboard → Environment as a secret
      - key: FIREBASE_CREDENTIALS_JSON
        value: ""

      # ── CORS ──────────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        value: '["https://neofacelabs.vercel.app","https://neoface.vercel.app","http://localhost:3000"]'

      # ── Face recognition ──────────────────────────────────────────────────────
      - key: ANTI_SPOOF_ENABLED
        value: "false"    # Models must be bundled or downloaded; disable until mounted
      - key: STRICT_MODEL_VERIFICATION
        value: "false"    # Allow startup without ONNX weights
      - key: USE_LIVENESS_PIPELINE
        value: "true"
      # ML models lazy-load on first request to avoid OOM at startup.
      # Set to true only on instances with ≥4GB RAM.
      - key: PRELOAD_MODELS
        value: "false"
      # Fix matplotlib permission error in non-root container
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib

      # ── Redis (add Render Redis add-on and replace URL) ───────────────────────
      - key: REDIS_URL
        value: redis://localhost:6379/0  # Replace with Render Redis URL

      # ── Storage ───────────────────────────────────────────────────────────────
      - key: STORAGE_BACKEND
        value: supabase

      # ── Admin bootstrap ───────────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        value: admin@neoface.io
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: NeoFace Admin
